train:
  learning_rate: 1e-6
  num_epochs: 50
  early_stopping_patience: 40
  turnover_penalty: 0
  enable_lr_warmup_decay: true
  lr_warmup_fraction: 0.1
  lr_min_factor: 0.1
  rl_training:
    reward_type: dsr_day_last
    enabled: true
    group_size: 128
    entropy_coef: 0.001
    alpha_min: 1e-6
    alpha_max: 2000.0
    rl_post_train_evidence_scale: 0.3
data:
  sample_num_stocks: 400
  train_batch_size: 5
model:
  detach_prev_weight: false
  use_prev_weight_feature: false
  allocation_smoothing_alpha: 1
  inference_allocation_mode: dirichlet_mean
  dirichlet_logit_scale: 5
