train:
  learning_rate: 1e-4
  num_epochs: 150
  early_stopping_patience: 80
  turnover_penalty: 0
  rl_training:
    enabled: true
    group_size: 64
    entropy_coef: 0.005
    alpha_min: 0.05
    alpha_max: 50.0
data:
  sample_num_stocks: 600
  train_batch_size: 5
model:
  detach_prev_weight: false
  use_prev_weight_feature: false
  allocation_smoothing_alpha: 1
  inference_allocation_mode: dirichlet_mean

