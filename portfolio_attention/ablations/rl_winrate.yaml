train:
  learning_rate: 1e-4
  num_epochs: 150
  early_stopping_patience: 100
  turnover_penalty: 0
  enable_lr_warmup_decay: false
  transaction_cost_rate: 0
  rl_training:
    enabled: true
    reward_type: win_rate
    group_size: 128
    entropy_coef: 0
    alpha_min: 1e-5
    alpha_max: 9000.0
    rl_post_train_evidence_scale: 1
evaluation:
  reward_baseline: uniform
data:
  sample_num_stocks: 600
  train_batch_size: 10
  rolling_horizon_days: 2
  rolling_stride_days: 1
model:
  detach_prev_weight: false
  use_prev_weight_feature: false
  allocation_smoothing_alpha: 1
  inference_allocation_mode: dirichlet_mean
  dirichlet_logit_scale: 3
