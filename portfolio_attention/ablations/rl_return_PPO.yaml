train:
  learning_rate: 1e-5
  num_epochs: 150
  early_stopping_patience: 100
  turnover_penalty: 0
  enable_lr_warmup_decay: true
  lr_warmup_fraction: 0.2
  lr_min_factor: 0.1
  transaction_cost_rate: 0.001
  rl_training:
    reward_type: return
    enabled: true
    algorithm: rollout_ppo
    entropy_coef: 0
    alpha_min: 1e-6
    alpha_max: 9000.0
    rl_post_train_evidence_scale: 0.1
    ppo_num_epochs: 3
    ppo_gamma: 0.9
    normalize_rollout_advantages: true
    ppo_clip_range: 0.1
    value_loss_coef: 0.0005
    reward_scale: 0.01
data:
  sample_num_stocks: 400
  train_batch_size: 10
  rolling_horizon_days: 30
  rolling_stride_days: 1
model:
  detach_prev_weight: false
  use_prev_weight_feature: false
  allocation_smoothing_alpha: 1
  inference_allocation_mode: dirichlet_mean
  dirichlet_logit_scale: 10
  dropout: 0.0