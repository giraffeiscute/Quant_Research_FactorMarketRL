train:
  learning_rate: 1e-3
  num_epochs: 70
  early_stopping_patience: 40
  turnover_penalty: 0
  holdout_backtest_interval_epochs: 3
data:
  sample_num_stocks: 1000
  train_batch_size: 10
model:
  detach_prev_weight: false
  use_prev_weight_feature: false
  allocation_smoothing_alpha: 1
  inference_allocation_mode: dirichlet_mean
  dirichlet_logit_scale: 10

